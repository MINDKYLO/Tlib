{% extends 'base.html' %}
{% block title %}เพิ่มอุปกรณ์{% endblock %}

{% block content %}
<div class="page-header d-flex align-items-center gap-2">
  <a href="{{ url_for('equipment_list') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2 text-primary"></i>เพิ่มอุปกรณ์ใหม่</h4>
</div>

<div class="row g-3">
  <!-- ฟอร์มเพิ่มอุปกรณ์ -->
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('add_equipment') }}" enctype="multipart/form-data">
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label fw-semibold">ชื่ออุปกรณ์ <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control"
                     placeholder="เช่น MacBook Pro 14 inch" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">หมวดหมู่ <span class="text-danger">*</span></label>
              <select name="category" class="form-select" required>
                <option value="">-- เลือกหมวดหมู่ --</option>
                {% for cat in categories %}
                <option value="{{ cat.name }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- เพิ่มหัวข้อพิเศษ -->
            <div class="col-12">
              <label class="form-label fw-semibold small text-muted mb-1">
                <i class="bi bi-layout-three-columns me-1"></i>หัวข้อพิเศษ
                <span class="fw-normal">(เพิ่มคอลัมน์เพิ่มเติม เช่น MAC, IP, ห้อง)</span>
              </label>
              <div class="d-flex gap-2 align-items-center flex-wrap">
                <div class="input-group input-group-sm" style="max-width:320px">
                  <input type="text" id="newColName" class="form-control"
                         placeholder="ชื่อหัวข้อ เช่น MAC Address"
                         onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomCol()}">
                  <button type="button" class="btn btn-outline-secondary" onclick="addCustomCol()">
                    <i class="bi bi-plus-lg"></i>
                  </button>
                </div>
                <div id="customColTags" class="d-flex gap-1 flex-wrap"></div>
              </div>
            </div>

            <!-- SERIAL GRID -->
            <div class="col-12">
              <label class="form-label fw-semibold mb-2">รายการอุปกรณ์</label>

              <div id="serialContainer">
                <!-- Column headers -->
                <div class="serial-grid-header" id="serialGridHeader">
                  <div class="sg-num">#</div>
                  <div class="sg-serial">Serial Number</div>
                  <div class="sg-brand">Brand</div>
                  <div class="sg-model">Model</div>
                  <div class="sg-desc">หมายเหตุ</div>
                  <!-- custom cols injected here -->
                  <div class="sg-action" id="sgActionHeader"></div>
                </div>

                <div id="serialList">
                  <div class="serial-entry serial-grid-row">
                    <div class="sg-num"><span class="serial-num badge bg-secondary">1</span></div>
                    <div class="sg-serial">
                      <input type="text" name="serial_number" class="form-control form-control-sm"
                             placeholder="เช่น SN-001">
                    </div>
                    <div class="sg-brand">
                      <input type="text" name="brand" class="form-control form-control-sm"
                             placeholder="เช่น CISCO">
                    </div>
                    <div class="sg-model">
                      <input type="text" name="model" class="form-control form-control-sm"
                             placeholder="เช่น 2960">
                    </div>
                    <div class="sg-desc">
                      <input type="text" name="serial_desc" class="form-control form-control-sm"
                             placeholder="หมายเหตุ">
                    </div>
                    <div class="sg-action">
                      <button type="button" class="btn btn-outline-danger btn-sm serial-remove-btn d-none"
                              onclick="removeSerial(this)">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" class="btn btn-outline-primary btn-sm w-100 mt-1" onclick="addSerial()">
                <i class="bi bi-plus-lg me-1"></i>เพิ่มรายการ
              </button>
              <input type="hidden" id="customColDefs" name="custom_col_defs" value="[]">
            </div>

            <!-- IMAGE -->
            <div class="col-12">
              <label class="form-label fw-semibold">
                <i class="bi bi-image me-1 text-primary"></i>รูปภาพ
                <span class="text-muted fw-normal">(ไม่บังคับ)</span>
              </label>
              <input type="file" name="image" id="imageInput" class="form-control"
                     accept="image/*" onchange="previewImage(this)">
              <div id="imagePreview" class="mt-2 d-none">
                <img id="previewImg" src="#" class="img-thumbnail" style="max-height:150px">
              </div>
            </div>

            <div class="col-12 d-flex gap-2 pt-2">
              <button type="submit" class="btn btn-primary flex-grow-1">
                <i class="bi bi-plus-lg me-1"></i>เพิ่มอุปกรณ์
              </button>
              <a href="{{ url_for('equipment_list') }}" class="btn btn-outline-secondary">ยกเลิก</a>
            </div>

          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- จัดการหมวดหมู่ -->
  <div class="col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold">
        <i class="bi bi-tags me-2 text-primary"></i>จัดการหมวดหมู่
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('category_list') }}" class="mb-3">
          <div class="input-group">
            <input type="text" name="name" class="form-control form-control-sm"
                   placeholder="ชื่อหมวดหมู่ใหม่..." required>
            <button type="submit" class="btn btn-primary btn-sm">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </form>

        <!-- ลบหลายรายการ -->
        <form method="POST" action="{{ url_for('delete_categories_bulk') }}" id="bulkCatForm"
              onsubmit="return confirmBulk()">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <div class="form-check mb-0">
              <input class="form-check-input" type="checkbox" id="selectAllCats"
                     onchange="toggleAllCats(this)">
              <label class="form-check-label small text-muted" for="selectAllCats">เลือกทั้งหมด</label>
            </div>
            <button type="submit" class="btn btn-xs btn-danger" id="bulkDeleteBtn" disabled>
              <i class="bi bi-trash me-1"></i>ลบที่เลือก (<span id="catSelectedCount">0</span>)
            </button>
          </div>

          <div style="max-height:300px;overflow-y:auto">
            {% for cat in categories %}
            <div class="d-flex align-items-center gap-2 py-1 border-bottom">
              <input class="form-check-input cat-check" type="checkbox"
                     name="ids" value="{{ cat.id }}" onchange="updateCatSelected()">
              <span class="small flex-grow-1">
                <i class="bi bi-tag me-1 text-muted"></i>{{ cat.name }}
              </span>
            </div>
            {% endfor %}
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleAllCats(master) {
  document.querySelectorAll('.cat-check').forEach(cb => cb.checked = master.checked);
  updateCatSelected();
}

function updateCatSelected() {
  const checks  = document.querySelectorAll('.cat-check');
  const checked = document.querySelectorAll('.cat-check:checked').length;
  document.getElementById('catSelectedCount').textContent = checked;
  document.getElementById('bulkDeleteBtn').disabled = checked === 0;
  const all = document.getElementById('selectAllCats');
  all.checked       = checked === checks.length && checks.length > 0;
  all.indeterminate = checked > 0 && checked < checks.length;
}

function confirmBulk() {
  const n = document.querySelectorAll('.cat-check:checked').length;
  return confirm(`ลบหมวดหมู่ที่เลือก ${n} รายการ?`);
}

/* ── custom columns ── */
let colCounter = 0;
let activeCols = [];

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addCustomCol() {
  const inp  = document.getElementById('newColName');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const id = colCounter++;
  activeCols.push({id, name});
  inp.value = '';

  // Tag badge in the tag area
  const tag = document.createElement('span');
  tag.className = 'badge bg-primary d-flex align-items-center gap-1';
  tag.dataset.colId = id;
  tag.innerHTML = `${escH(name)}<button type="button" class="btn-close btn-close-white"
    style="font-size:0.5rem" onclick="removeCustomCol(${id})"></button>`;
  document.getElementById('customColTags').appendChild(tag);

  // Header cell (before the action header)
  const hCell = document.createElement('div');
  hCell.className = 'sg-custom';
  hCell.dataset.colId = id;
  hCell.innerHTML = `<span class="text-truncate">${escH(name)}</span>`;
  document.getElementById('serialGridHeader').insertBefore(hCell, document.getElementById('sgActionHeader'));

  // Input cell in each existing serial row
  document.querySelectorAll('.serial-entry').forEach(row => {
    row.insertBefore(makeCustomCell(id, name), row.querySelector('.sg-action'));
  });

  updateGridTemplate();
  updateColDefs();
  inp.focus();
}

function removeCustomCol(id) {
  activeCols = activeCols.filter(c => c.id !== id);
  document.querySelectorAll(`[data-col-id="${id}"]`).forEach(el => el.remove());
  updateGridTemplate();
  updateColDefs();
}

function makeCustomCell(id, name) {
  const cell = document.createElement('div');
  cell.className = 'sg-custom';
  cell.dataset.colId = id;
  cell.innerHTML = `<input type="text" name="cf_${id}" class="form-control form-control-sm" placeholder="${escH(name)}">`;
  return cell;
}

function updateGridTemplate() {
  const customPart = activeCols.map(() => '130px').join(' ');
  const tpl = ['32px','1fr','110px','110px','130px', customPart, '38px'].filter(s=>s).join(' ');
  document.getElementById('serialContainer').style.setProperty('--sgrid', tpl);
}

function updateColDefs() {
  document.getElementById('customColDefs').value = JSON.stringify(activeCols);
}

/* ── serial rows ── */
function addSerial() {
  const list    = document.getElementById('serialList');
  const entries = list.querySelectorAll('.serial-entry');
  let defBrand = '', defModel = '';
  if (entries.length > 0) {
    defBrand = entries[0].querySelector('[name="brand"]').value;
    defModel = entries[0].querySelector('[name="model"]').value;
  }
  const num = entries.length + 1;
  const div = document.createElement('div');
  div.className = 'serial-entry serial-grid-row';
  div.innerHTML = `
    <div class="sg-num"><span class="serial-num badge bg-secondary">${num}</span></div>
    <div class="sg-serial">
      <input type="text" name="serial_number" class="form-control form-control-sm" placeholder="เช่น SN-00${num}">
    </div>
    <div class="sg-brand">
      <input type="text" name="brand" class="form-control form-control-sm" placeholder="Brand" value="${escH(defBrand)}">
    </div>
    <div class="sg-model">
      <input type="text" name="model" class="form-control form-control-sm" placeholder="Model" value="${escH(defModel)}">
    </div>
    <div class="sg-desc">
      <input type="text" name="serial_desc" class="form-control form-control-sm" placeholder="หมายเหตุ">
    </div>
    <div class="sg-action">
      <button type="button" class="btn btn-outline-danger btn-sm serial-remove-btn"
              onclick="removeSerial(this)"><i class="bi bi-trash"></i></button>
    </div>`;
  activeCols.forEach(col => {
    div.insertBefore(makeCustomCell(col.id, col.name), div.querySelector('.sg-action'));
  });
  list.appendChild(div);
  updateSerialRows();
  const sn = div.querySelector('[name="serial_number"]');
  sn.focus();
  sn.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function removeSerial(btn) {
  btn.closest('.serial-entry').remove();
  updateSerialRows();
}

function updateSerialRows() {
  const entries = document.querySelectorAll('.serial-entry');
  entries.forEach((entry, i) => {
    const num = entry.querySelector('.serial-num');
    if (num) num.textContent = i + 1;
    const btn = entry.querySelector('.serial-remove-btn');
    if (btn) btn.classList.toggle('d-none', entries.length === 1);
  });
}

function previewImage(input) {
  const preview = document.getElementById('imagePreview');
  const img     = document.getElementById('previewImg');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; preview.classList.remove('d-none'); };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
